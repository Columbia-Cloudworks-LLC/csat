name: Bug report
description: Report a defect in CSAT
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Before filing, please redact any hostnames, IPs, account names, or serials from logs you paste.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Windows collector (csat-collect.ps1)
        - Linux collector (csat-collect.sh)
        - Aggregator (aggregator/csat)
        - Schema / docs
        - Samples / CI
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CSAT version
      placeholder: "e.g. v1.0.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Host platform / OS
      placeholder: "e.g. Windows Server 2016 build 14393, RHEL 8.9, Ubuntu 22.04"
    validations:
      required: true
  - type: dropdown
    id: elevated
    attributes:
      label: Was the collector run elevated?
      options:
        - "Yes - Administrator / root"
        - "No"
        - "N/A (aggregator)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what actually happened?
    validations:
      required: true
  - type: textarea
    id: warnings
    attributes:
      label: collection_warnings array
      description: Paste the contents of `collection_warnings` from the snapshot, redacted as needed.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Paste relevant terminal output. Redact hostnames/IPs/serials.
      render: shell
